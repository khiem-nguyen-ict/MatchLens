<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MatchLens</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            /* LinkedIn's exact font stack */
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 14px;
            font-style: normal;
            font-weight: 400;
            line-height: 1.5;
            margin: 0;
            padding: 16px;
            width: 320px;
            /* LinkedIn's signature warm-gray page background */
            background: #f3f2ef;
            /* LinkedIn's primary text: rgba(0,0,0,0.9) */
            color: rgba(0, 0, 0, 0.9);
        }

        h1,
        h2 {
            margin-top: 0;
            margin-bottom: 4px;
            text-align: center;
            /* LinkedIn uses its blue only on interactive/brand elements, not headings */
            color: rgba(0, 0, 0, 0.9);
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        h1 {
            font-size: 20px;
            line-height: 1.3;
        }

        h2 {
            font-size: 16px;
            line-height: 1.3;
        }

        .info {
            font-size: 12px;
            /* LinkedIn secondary text: rgba(0,0,0,0.6) */
            color: rgba(0, 0, 0, 0.6);
            margin-bottom: 12px;
            line-height: 1.4;
            text-align: center;
            /* LinkedIn uses rgba(0,0,0,0.15) for dividers */
            border-bottom: 1px solid rgba(0, 0, 0, 0.15);
            padding-bottom: 12px;
        }

        #profile,
        input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            /* LinkedIn inputs have a nearly flat radius */
            border: 1px solid rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            background: #fff;
            color: rgba(0, 0, 0, 0.9);
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.15s ease;
            outline: none;
        }

        #profile:focus,
        input[type="text"]:focus {
            border-color: #0a66c2;
            box-shadow: 0 0 0 1px #0a66c2;
        }

        #profile {
            height: 120px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            resize: vertical;
            font-size: 12px;
            line-height: 1.5;
        }

        .buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        button {
            flex: 1;
            padding: 6px 16px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            line-height: 1.5;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            color: #fff;
            transition: background-color 0.15s ease, box-shadow 0.15s ease;
            height: 36px;
            letter-spacing: 0;
            white-space: nowrap;

            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:disabled {
            background-color: rgba(0, 0, 0, 0.08) !important;
            color: rgba(0, 0, 0, 0.3) !important;
            cursor: not-allowed !important;
            border: none !important;
            box-shadow: none !important;
            opacity: 1;
        }

        /* LinkedIn primary CTA */
        .primary-button {
            background-color: #0a66c2;
        }

        .primary-button:hover:not(:disabled) {
            /* LinkedIn's darker hover: #004182 */
            background-color: #004182;
        }

        .primary-button:active:not(:disabled) {
            background-color: #003375;
        }

        /* LinkedIn secondary/ghost button */
        .secondary-button {
            background-color: #ffffff;
            color: #0a66c2;
            border: 1.5px solid #0a66c2;
        }

        .secondary-button:hover:not(:disabled) {
            background-color: rgba(112, 181, 249, 0.15);
            border-color: #0a66c2;
        }

        .secondary-button:active:not(:disabled) {
            background-color: rgba(112, 181, 249, 0.3);
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.9);
        }

        .footer {
            font-size: 11px;
            /* LinkedIn tertiary/muted text */
            color: rgba(0, 0, 0, 0.45);
            margin-top: 10px;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <h1>MatchLens</h1>

    <div class="info">
        Smart form detection and LinkedIn profile optimization.
    </div>

    <textarea id="profile" placeholder="Paste your profile JSON here"></textarea>

    <div class="buttons" id="linkedInSettings">
        <button id="saveSettings" class="secondary-button">Save</button>
    </div>

    <div class="buttons" id="linkedInProfileSection" style="display: none;">
        <button id="editIntro" class="secondary-button">Edit Intro</button>
        <button id="editAbout" class="secondary-button">Edit About</button>
    </div>

    <div class="buttons" id="linkedInJobSection" style="display: none;">
        <button id="findJobs" class="primary-button">Find Jobs</button>
        <button id="getJobDescription" class="secondary-button">Job Description</button>
    </div>

    <div id="linkedInMessage" class="info" style="margin-top: 12px;"></div>

    <div class="footer">
        Author: Khiem Nguyen Thanh<br>
        MatchLens automatically optimizes your LinkedIn profile.
    </div>
    <script src="utils.js"></script>
    <script src="popup.js"></script>
</body>

</html>
