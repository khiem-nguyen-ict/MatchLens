<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MatchLens</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 16px;
            width: 320px;
            background: #f5f6fa;
            color: #333;
            font-size: 13px;
        }

        h1,
        h2 {
            margin-bottom: 8px;
            text-align: center;
            color: #2f3640;
        }

        h1 {
            font-size: 18px;
        }

        h2 {
            font-size: 14px;
        }

        .info {
            font-size: 12px;
            color: #718093;
            margin-bottom: 12px;
            line-height: 1.3;
            text-align: center;
            border-bottom: 1px solid #dcdde1;
            padding-bottom: 8px;
        }

        #profile,
        input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #dcdde1;
            border-radius: 4px;
            box-sizing: border-box;
        }

        #profile {
            height: 120px;
            font-family: monospace;
            resize: vertical;
            transition: border 0.2s;
        }

        .buttons {
            display: flex;
            gap: 4px;
            margin-top: 12px;
        }

        button {
            flex: 1;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background-color: #0077b5;
            color: white;
            transition: background 0.2s, transform 0.1s;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        .footer {
            font-size: 11px;
            color: #718093;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>MatchLens</h1>

    <div class="info">
        Smart form detection and LinkedIn profile optimization.
    </div>

    <textarea id="profile" placeholder="Paste your profile JSON here"></textarea>

    <div class="buttons">
        <button id="save">Save</button>
    </div>

    <!-- LinkedIn Section -->
    <div id="linkedInSection">
        <h2>LinkedIn Profile</h2>

        <div id="linkedInStatus" class="info">
            Profile ID: <strong id="profileIdDisplay">-</strong>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="headlineInput">Headline:</label>
            <input type="text" id="headlineInput" placeholder="Enter new headline..." />
        </div>

        <button id="updateLinkedInProfile" style="width: 100%;" class="button">
            Optimize LinkedIn Profile
        </button>

        <div id="linkedInMessage" class="info"></div>
    </div>
    <div class="footer">
        Author: Khiem Nguyen Thanh<br>
        Data is stored locally. MatchLens automatically detects forms and LinkedIn profiles.
    </div>

    <script src="popup.js"></script>
</body>

</html>
