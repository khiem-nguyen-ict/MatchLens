<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>MatchLens</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Oxygen, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            font-size: 14.5px;
            font-style: normal;
            font-weight: 400;
            margin: 0;
            padding: 16px;
            width: 320px;
            background: white;
            color: #000000E6;
        }

        h1,
        h2 {
            margin-bottom: 8px;
            text-align: center;
            color: #0A66C2;
        }

        h1 {
            font-size: 18px;
        }

        h2 {
            font-size: 14px;
        }

        .info {
            font-size: 13px;
            color: #00000099;
            margin-bottom: 12px;
            line-height: 1.3;
            text-align: center;
            border-bottom: 1px solid #dcdde1;
            padding-bottom: 8px;
        }

        #profile,
        input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #dcdde1;
            border-radius: 4px;
        }

        #profile {
            height: 120px;
            font-family: monospace;
            resize: vertical;
            transition: border 0.2s;
            font-size: 12px;
        }

        .buttons {
            display: flex;
            gap: 6px;
            margin-top: 12px;
        }

        button {
            flex: 1;
            padding: 8px 12px;
            font-weight: 600;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            color: white;
            transition: background 0.2s, transform 0.1s;
            height: 35px;
        }

        button:disabled {
            background-color: #dcdde1 !important;
            color: #a0a0a0 !important;
            cursor: not-allowed !important;
            border: none !important;
            opacity: 1;
        }

        .primary-button {
            background-color: #0A66C2;
        }

        .primary-button:hover {
            background-color: #084d8a;
        }

        .secondary-button {
            background-color: white;
            color: #0A66C2;
            border: 1px solid #0A66C2;
        }

        .secondary-button:hover {
            background-color: #f0f4ff;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        .footer {
            font-size: 11px;
            color: #718093;
            margin-top: 8px;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>MatchLens</h1>

    <div class="info">
        Smart form detection and LinkedIn profile optimization.
    </div>

    <textarea id="profile" placeholder="Paste your profile JSON here"></textarea>

    <div class="buttons">
        <button id="save" class="secondary-button">Save</button>
    </div>

    <div class="buttons" id="linkedInSection" style="display: none;">
        <button id="editIntro" class="secondary-button">Edit Intro</button>
        <button id="editAbout" class="secondary-button">Edit About</button>
    </div>

    <div class="buttons" id="linkedInUtils">
        <button id="findJobs" class="primary-button">Find Jobs</button>
    </div>

    <div id="linkedInMessage" class="info" style="margin-top: 12px;"></div>

    <div class="footer">
        Author: Khiem Nguyen Thanh<br>
        MatchLens automatically optimizes your LinkedIn profile.
    </div>
    <script src="utils.js"></script>
    <script src="popup.js"></script>
</body>

</html>
